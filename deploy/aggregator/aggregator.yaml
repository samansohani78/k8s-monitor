apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8swatch-aggregator
  namespace: k8swatch
  labels:
    app.kubernetes.io/name: k8swatch-aggregator
    app.kubernetes.io/component: aggregator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8swatch-aggregator
  labels:
    app.kubernetes.io/name: k8swatch-aggregator
    app.kubernetes.io/component: aggregator
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["k8swatch.io"]
  resources: ["targets", "alertrules"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8swatch-aggregator
  labels:
    app.kubernetes.io/name: k8swatch-aggregator
    app.kubernetes.io/component: aggregator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8swatch-aggregator
subjects:
- kind: ServiceAccount
  name: k8swatch-aggregator
  namespace: k8swatch
---
apiVersion: v1
kind: Service
metadata:
  name: k8swatch-aggregator
  namespace: k8swatch
  labels:
    app.kubernetes.io/name: k8swatch-aggregator
    app.kubernetes.io/component: aggregator
spec:
  ports:
  - name: grpc
    port: 50051
    targetPort: grpc
    protocol: TCP
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: k8swatch-aggregator
    app.kubernetes.io/component: aggregator
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8swatch-aggregator
  namespace: k8swatch
  labels:
    app.kubernetes.io/name: k8swatch-aggregator
    app.kubernetes.io/component: aggregator
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: k8swatch-aggregator
      app.kubernetes.io/component: aggregator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8swatch-aggregator
        app.kubernetes.io/component: aggregator
    spec:
      serviceAccountName: k8swatch-aggregator
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: k8swatch-aggregator
            topologyKey: topology.kubernetes.io/zone
      containers:
      - name: aggregator
        image: k8swatch/aggregator:v1.0.0
        imagePullPolicy: IfNotPresent
        args:
        - --grpc-address=:50051
        - --http-address=:8080
        ports:
        - name: grpc
          containerPort: 50051
          protocol: TCP
        - name: http
          containerPort: 8080
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
