apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8swatch-redis
  namespace: k8swatch
  labels:
    app.kubernetes.io/name: k8swatch-redis
    app.kubernetes.io/component: state-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8swatch-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8swatch-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: redis
          containerPort: 6379
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: k8swatch-redis
  namespace: k8swatch
  labels:
    app.kubernetes.io/name: k8swatch-redis
spec:
  ports:
  - name: redis
    port: 6379
    targetPort: redis
  selector:
    app.kubernetes.io/name: k8swatch-redis
  type: ClusterIP
