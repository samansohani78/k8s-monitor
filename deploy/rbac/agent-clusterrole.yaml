---
# K8sWatch Agent ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8swatch-agent
  namespace: k8swatch
  labels:
    app.kubernetes.io/name: k8swatch
    app.kubernetes.io/component: agent
---
# K8sWatch Agent ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8swatch-agent
  labels:
    app.kubernetes.io/name: k8swatch
    app.kubernetes.io/component: agent
rules:
  # Read ConfigMaps for configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["k8swatch-config"]
  # Read Target CRDs
  - apiGroups: ["k8swatch.io"]
    resources: ["targets"]
    verbs: ["get", "list", "watch"]
  # Read nodes for node information
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
  # Read secrets for target credentials (scoped by resourceNames in Target spec)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # Send events (for Kubernetes event integration)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
# K8sWatch Agent ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8swatch-agent
  labels:
    app.kubernetes.io/name: k8swatch
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8swatch-agent
subjects:
  - kind: ServiceAccount
    name: k8swatch-agent
    namespace: k8swatch
