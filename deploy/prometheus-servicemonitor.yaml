  namespaceSelector:
    matchNames:
      - k8swatch
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
# Prometheus ServiceMonitor for K8sWatch AlertManager
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: k8swatch-alertmanager
  namespace: k8swatch
  labels:
    app.kubernetes.io/name: k8swatch
