---
# FluentBit ConfigMap for K8sWatch log shipping
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8swatch-fluentbit-config
  namespace: k8swatch
  labels:
    app.kubernetes.io/name: k8swatch
    app.kubernetes.io/component: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

    [INPUT]
        Name              tail
        Path              /var/log/containers/k8swatch-agent*.log
        Parser            docker
        Tag               k8swatch.agent
        Refresh_Interval  10
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        DB                /var/log/flb_k8swatch_agent.db

    [INPUT]
        Name              tail
        Path              /var/log/containers/k8swatch-aggregator*.log
        Parser            docker
        Tag               k8swatch.aggregator
        Refresh_Interval  10
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        DB                /var/log/flb_k8swatch_aggregator.db

    [INPUT]
        Name              tail
        Path              /var/log/containers/k8swatch-alertmanager*.log
        Parser            docker
        Tag               k8swatch.alertmanager
        Refresh_Interval  10
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        DB                /var/log/flb_k8swatch_alertmanager.db

    [FILTER]
        Name                kubernetes
        Match               k8swatch.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kubernetes.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [FILTER]
        Name          modify
        Match         k8swatch.*
        Add           cluster ${CLUSTER_NAME}

    [OUTPUT]
        Name          loki
        Match         k8swatch.*
        Host          loki.observability.svc.cluster.local
        Port          3100
        URI           /loki/api/v1/push
        BatchWait     1
        BatchSize     1048576
        LineFormat    json
        LabelKeys     $kubernetes['pod_name'],$kubernetes['namespace_name'],$kubernetes['container_name'],$kubernetes['host'],cluster,component
        RemoveKeys    kubernetes,stream

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep   On
        Decode_Field_As json log

    [PARSER]
        Name        json
        Format      json
        Time_Key    timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep   On

---
# FluentBit DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k8swatch-fluentbit
  namespace: k8swatch
  labels:
    app.kubernetes.io/name: k8swatch
    app.kubernetes.io/component: logging
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k8swatch
      app.kubernetes.io/component: logging
      component: fluentbit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8swatch
        app.kubernetes.io/component: logging
        component: fluentbit
    spec:
      serviceAccountName: k8swatch-fluentbit
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:2.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 2020
          name: http
          protocol: TCP
        env:
        - name: CLUSTER_NAME
          valueFrom:
            configMapKeyRef:
              name: k8swatch-config
              key: cluster-name
              optional: true
        volumeMounts:
        - name: config
          mountPath: /fluent-bit/etc
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: fluentbit-db
          mountPath: /var/log
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 2020
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 2020
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: k8swatch-fluentbit-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: fluentbit-db
        emptyDir: {}
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

---
# FluentBit RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8swatch-fluentbit
  namespace: k8swatch
  labels:
    app.kubernetes.io/name: k8swatch
    app.kubernetes.io/component: logging

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8swatch-fluentbit
  labels:
    app.kubernetes.io/name: k8swatch
    app.kubernetes.io/component: logging
rules:
- apiGroups: [""]
  resources:
  - namespaces
  - pods
  - pods/log
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8swatch-fluentbit
  labels:
    app.kubernetes.io/name: k8swatch
    app.kubernetes.io/component: logging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8swatch-fluentbit
subjects:
- kind: ServiceAccount
  name: k8swatch-fluentbit
  namespace: k8swatch
