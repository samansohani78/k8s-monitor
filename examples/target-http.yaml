apiVersion: k8swatch.io/v1
kind: Target
metadata:
  name: example-http
  namespace: k8swatch
  labels:
    team: platform
    environment: production
spec:
  type: http
  endpoint:
    dns: httpbin.org
    port: 80
    path: /get
  networkModes:
    - pod
  layers:
    L0_nodeSanity:
      enabled: true
    L1_dns:
      enabled: true
    L2_tcp:
      enabled: true
      timeout: 5s
    L4_protocol:
      enabled: true
      method: GET
      timeout: 10s
    L6_semantic:
      enabled: false
  schedule:
    interval: 60s
    timeout: 15s
  alerting:
    criticalityOverride: P2
  tags:
    category: http
