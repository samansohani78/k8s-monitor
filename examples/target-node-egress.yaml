apiVersion: k8swatch.io/v1
kind: Target
metadata:
  name: example-node-egress
  namespace: k8swatch
  labels:
    team: platform
    environment: production
spec:
  type: node-egress
  endpoint:
    dns: google.com
    port: 443
  networkModes:
    - host
  layers:
    L0_nodeSanity:
      enabled: true
    L1_dns:
      enabled: true
    L2_tcp:
      enabled: true
      timeout: 10s
  schedule:
    interval: 60s
    timeout: 15s
  alerting:
    criticalityOverride: P1
  tags:
    category: connectivity
