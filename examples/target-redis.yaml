apiVersion: k8swatch.io/v1
kind: Target
metadata:
  name: example-redis
  namespace: k8swatch
  labels:
    team: cache
    environment: production
spec:
  type: redis
  endpoint:
    k8sService:
      name: redis-master
      namespace: cache
      port: "6379"
  networkModes:
    - pod
  layers:
    L0_nodeSanity:
      enabled: true
    L1_dns:
      enabled: true
    L2_tcp:
      enabled: true
      timeout: 5s
    L4_protocol:
      enabled: true
      timeout: 5s
    L5_auth:
      enabled: true
      token: ""
    L6_semantic:
      enabled: true
  schedule:
    interval: 30s
    timeout: 10s
  alerting:
    criticalityOverride: P1
  tags:
    category: cache
