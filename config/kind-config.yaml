# kind-config.yaml - Kind cluster configuration for development
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: k8swatch-dev

# Configure nodes
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
  - role: worker

# Configure networking
networking:
  # Use Calico CNI (optional, default is kindnet)
  # disableDefaultCNI: true
  # podSubnet: "192.168.0.0/16"
  # serviceSubnet: "10.96.0.0/16"
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"

# Feature gates (optional)
featureGates:
  "EphemeralContainers": true
