name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run go mod tidy
        run: go mod tidy

      - name: Run go fmt
        run: make fmt

      - name: Run go vet
        run: make vet

      - name: Run golangci-lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Run security scan
        run: make security-scan

      - name: Verify generated files
        run: make check-generated

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        run: make build

      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: agent
          path: bin/agent

      - name: Upload aggregator binary
        uses: actions/upload-artifact@v4
        with:
          name: aggregator
          path: bin/aggregator

      - name: Upload alertmanager binary
        uses: actions/upload-artifact@v4
        with:
          name: alertmanager
          path: bin/alertmanager

  test-crds:
    name: Test CRDs
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@latest

      - name: Generate CRDs
        run: make manifests

      - name: Validate CRD YAML
        run: |
          for file in config/crd/bases/*.yaml; do
            echo "Validating $file..."
            python3 -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
          done
          echo "All CRD YAML files are valid"
